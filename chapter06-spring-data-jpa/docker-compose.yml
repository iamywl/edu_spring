# Docker Compose - PostgreSQL + Spring Boot 애플리케이션
# 사용법:
#   PostgreSQL만 실행: docker compose up postgres -d
#   전체 실행:         docker compose up -d
#   종료:             docker compose down
#   볼륨 포함 종료:    docker compose down -v

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edu_spring        # 생성할 데이터베이스명
      POSTGRES_USER: edu             # 사용자명
      POSTGRES_PASSWORD: edu1234     # 비밀번호
    ports:
      - "5432:5432"                  # 호스트:컨테이너 포트 매핑
    volumes:
      - pgdata:/var/lib/postgresql/data  # 데이터 영속화 (볼륨 마운트)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu"]  # 헬스체크: PostgreSQL 준비 상태 확인
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot 애플리케이션
  app:
    build: .                         # 현재 디렉토리의 Dockerfile로 빌드
    ports:
      - "8080:8080"
    environment:
      # application.yml의 설정을 환경 변수로 오버라이드
      # Docker 네트워크에서는 서비스명(postgres)으로 접근
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edu_spring
      SPRING_DATASOURCE_USERNAME: edu
      SPRING_DATASOURCE_PASSWORD: edu1234
    depends_on:
      postgres:
        condition: service_healthy   # PostgreSQL이 준비된 후에 앱 시작

# 명명된 볼륨 - PostgreSQL 데이터 영속화
volumes:
  pgdata:
