# 테스트 전용 설정
# - PostgreSQL 대신 인메모리 H2를 사용해 외부 DB 없이 테스트를 실행한다.
# - JWT 비밀키는 테스트용 별도 값(32자 이상)을 사용한다.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: testSecretKeyForJwtThatIsAtLeast32BytesLongForHS256
  expiration: 3600000
