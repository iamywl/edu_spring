spring:
  application:
    name: chapter08-testing

  datasource:
    url: jdbc:postgresql://localhost:5432/edu_db
    username: edu_user
    password: edu_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
