spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/edu_spring
    username: edu
    password: edu1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # 운영 환경에서는 비밀키를 코드/설정 파일에 두지 말고 환경 변수(JWT_SECRET)로 외부화해야 합니다.
  # ${ENV:default} 문법: 환경 변수가 있으면 그 값을, 없으면 콜론 뒤의 개발용 기본값을 사용합니다.
  secret: ${JWT_SECRET:mySecretKeyForBoardProjectJwtTokenGeneration1234567890abcdef}
  expiration: 86400000

server:
  port: 8080
