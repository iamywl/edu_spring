# CS 데이터베이스 트랙 전용 PostgreSQL 실습 환경
# (spring/ 인프라와 독립 — 포트 충돌을 피하려고 5433/8082를 사용한다)
services:
  db-lab-postgres:
    image: postgres:16-alpine
    container_name: db-lab-postgres
    environment:
      POSTGRES_DB: edu_spring
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu1234
    ports:
      - "5433:5432"   # 호스트 5433 → 컨테이너 5432 (spring 인프라의 5432와 충돌 방지)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-lab-adminer:
    image: adminer
    container_name: db-lab-adminer
    ports:
      - "8082:8080"   # 접속: http://localhost:8082 (서버: db-lab-postgres)
    depends_on:
      - db-lab-postgres
