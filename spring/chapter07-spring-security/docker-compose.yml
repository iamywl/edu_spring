# Docker Compose 설정
# PostgreSQL과 Spring Boot 애플리케이션을 함께 실행합니다.
#
# 사용법:
#   docker-compose up --build       # 빌드 후 실행
#   docker-compose up -d --build    # 백그라운드 실행
#   docker-compose down             # 중지
#   docker-compose down -v          # 중지 + 볼륨 삭제 (DB 데이터 초기화)

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16-alpine
    container_name: spring-ch07-postgres
    environment:
      POSTGRES_DB: edu_spring         # 데이터베이스명
      POSTGRES_USER: edu              # 사용자명
      POSTGRES_PASSWORD: edu1234      # 비밀번호
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data    # 데이터 영속화
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu -d edu_spring"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot 애플리케이션
  app:
    build: .
    container_name: spring-ch07-security
    ports:
      - "8080:8080"
    environment:
      # application.yml의 설정을 환경 변수로 오버라이드
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edu_spring
      SPRING_DATASOURCE_USERNAME: edu
      SPRING_DATASOURCE_PASSWORD: edu1234
      JWT_SECRET: mySecretKeyForJwtTokenGenerationMustBeLongEnough123456
      JWT_EXPIRATION: 3600000
    depends_on:
      postgres:
        condition: service_healthy    # PostgreSQL이 준비된 후 실행
    restart: on-failure

volumes:
  postgres-data:
