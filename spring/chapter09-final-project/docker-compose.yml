# Docker Compose 설정 - 게시판 REST API 전체 환경
#
# 실행: docker compose up --build
# 종료: docker compose down
# DB 초기화 포함 종료: docker compose down -v

services:
  # PostgreSQL 데이터베이스
  postgres:
    container_name: spring-ch09-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edu_spring
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (추후 캐시/세션 확장용)
  redis:
    container_name: spring-ch09-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Spring Boot 애플리케이션
  app:
    container_name: spring-ch09-board
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edu_spring
      SPRING_DATASOURCE_USERNAME: edu
      SPRING_DATASOURCE_PASSWORD: edu1234
      JWT_SECRET: mySecretKeyForBoardProjectJwtTokenGeneration1234567890abcdef
    depends_on:
      postgres:
        condition: service_healthy

  # Adminer - DB 관리 웹 UI (http://localhost:8081)
  adminer:
    container_name: spring-ch09-adminer
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
